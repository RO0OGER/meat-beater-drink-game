<div class="scroll-page">
  <div>
    <h2 class="sp-title">EINSTELLUNGEN</h2>
    @if (round) {
      <p class="sp-sub">Runde: {{ round.round_code }}</p>
    }
  </div>

  <div class="sp-nav-btns">
    <button class="btn btn--ghost" (click)="goToAddDrinks()">✍ Drinks bearbeiten</button>
    <button class="btn btn--ghost" (click)="goToAddWithScanner()">📷 Scanner</button>
  </div>

  <div class="card">
    <p class="section-title" style="margin-bottom:14px">Hits</p>
    <div class="sp-grid">
      <div class="form-group">
        <label class="form-label" style="color:var(--team1)">Hits Team 1</label>
        <input class="form-input" type="number" [(ngModel)]="team1Hits" />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:var(--team2)">Hits Team 2</label>
        <input class="form-input" type="number" [(ngModel)]="team2Hits" />
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title" style="margin-bottom:14px">Verbleibende Zeit (Sekunden)</p>
    <div class="sp-grid">
      <div class="form-group">
        <label class="form-label" style="color:var(--team1)">Team 1</label>
        <input class="form-input" type="number" [(ngModel)]="remainingTimeTeam1" />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:var(--team2)">Team 2</label>
        <input class="form-input" type="number" [(ngModel)]="remainingTimeTeam2" />
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title" style="margin-bottom:14px">Spieler</p>
    <div class="sp-grid">
      <div class="form-group">
        <label class="form-label" style="color:var(--team1)">Team 1</label>
        <input class="form-input" type="number" [(ngModel)]="numPlayersTeam1" />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:var(--team2)">Team 2</label>
        <input class="form-input" type="number" [(ngModel)]="numPlayersTeam2" />
      </div>
    </div>
  </div>

  <button class="btn btn--primary" (click)="saveChanges()">💾 Änderungen speichern</button>
  <button class="btn btn--danger" (click)="endRound()">Runde beenden</button>
</div>
