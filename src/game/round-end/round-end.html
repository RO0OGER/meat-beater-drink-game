<div class="re-wrap">
  <div class="re-content">
    <h1 class="re-title">RUNDE BEENDEN</h1>

    <div class="card re-warning">
      <p>⚠ Diese Aktion löscht die Runde und alle zugehörigen Daten.</p>
    </div>

    <div class="re-actions">
      <button class="btn btn--danger" (click)="confirmAndDelete()">🗑 Runde löschen</button>
      <button class="btn btn--ghost" (click)="toggleExtend()">⏭ Weiter spielen?</button>
    </div>

    @if (confirmDelete) {
      <div class="card re-confirm-box">
        <p style="font-weight:600; margin-bottom:12px">Bist du sicher?</p>
        <div style="display:flex; gap:8px">
          <button class="btn btn--danger" (click)="deleteEverything()">Ja, löschen</button>
          <button class="btn btn--ghost" (click)="cancelDelete()">Abbrechen</button>
        </div>
      </div>
    }

    @if (showExtend) {
      <div class="card re-extend-box">
        <p class="section-title">Zusatzzeit für {{ team }}</p>
        <div class="form-group" style="margin-top:10px">
          <label class="form-label">Minuten</label>
          <input class="form-input" type="number" [(ngModel)]="extraMinutes" min="1" placeholder="z.B. 5" />
        </div>
        <button class="btn btn--primary" style="margin-top:12px" (click)="applyExtraTime()">✅ Zeit hinzufügen</button>
      </div>
    }
  </div>
</div>
