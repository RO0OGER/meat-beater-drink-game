<div class="page">
  <button class="btn btn--ghost btn--sm" style="width:auto" (click)="back()">← Zurück</button>

  <div>
    <h2 style="font-size:2rem; letter-spacing:3px; color:var(--accent)">NEUES SPIEL</h2>
    <p style="color:var(--text-muted); font-size:0.85rem; margin-top:4px">Gib deinem Spiel einen Namen</p>
  </div>

  <div class="card" style="margin-top:8px">
    <form [formGroup]="form" (ngSubmit)="create()" style="display:flex; flex-direction:column; gap:16px">
      <div class="form-group">
        <label class="form-label">Spielname</label>
        <input class="form-input" formControlName="name" placeholder="z.B. Beer Pong Liga 2025" />
      </div>
      <button type="submit" class="btn btn--primary" [disabled]="form.invalid || creating">
        {{ creating ? 'Erstelle...' : '🎮 Spiel erstellen' }}
      </button>
    </form>
  </div>
</div>
