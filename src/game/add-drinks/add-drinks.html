<div class="scroll-page">
  <div>
    <h2 class="ad-title">DRINKS</h2>
    <p style="color:var(--text-muted); font-size:0.82rem; margin-top:3px">Getränke für diese Runde</p>
  </div>

  @if (drinks.length === 0) {
    <div class="card" style="text-align:center; color:var(--text-muted); padding:28px">
      Noch keine Drinks. Füge welche hinzu!
    </div>
  } @else {
    <div class="ad-list">
      @for (drink of drinks; track drink.id) {
        <div class="list-item">
          <span class="ad-drink-icon">🍺</span>
          <div class="ad-drink-info">
            <span class="ad-drink-name">{{ drink.drink_name }}</span>
            <span class="ad-drink-ml">{{ drink.quantity_ml }} ml</span>
          </div>
          <button class="btn btn--ghost btn--sm btn--icon" (click)="deleteDrink(drink.id)">✕</button>
        </div>
      }
    </div>
  }

  <hr class="divider" />

  <div class="ad-actions">
    <button class="btn btn--ghost" (click)="addManual()">✍ Manuell hinzufügen</button>
    <button class="btn btn--ghost" (click)="addByScanner()">📷 Mit Scanner</button>
  </div>

  <button class="btn btn--primary" (click)="startGame()">▶ Spiel starten</button>
</div>
