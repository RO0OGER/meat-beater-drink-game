<div class="cd-wrap">
  <div class="cd-content">
    @if (currentTask) {
      <p class="cd-task-label">{{ currentTask.label }}</p>
    }

    <div class="cd-timer-ring">
      <div class="cd-time">{{ minutes }}<span class="cd-colon">:</span>{{ seconds }}</div>
    </div>

    <button class="btn btn--success cd-btn" (click)="finishTask()">✅ Aufgabe abgeschlossen</button>
  </div>
</div>
