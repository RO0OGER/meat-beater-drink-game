<div class="hit-wrap hit-wrap--t1">
  <button class="hit-back-btn" (click)="backToGame()">← Zurück</button>
  <div class="hit-content">
    <div class="hit-icon">🏓</div>
    <h1 class="hit-headline hit-headline--t1">TREFFER!</h1>
    <p class="hit-sub">Becher von <strong>Team 1</strong> wurde getroffen</p>
    <p class="hit-question">Ist Team 1 bereit für die Aufgabe?</p>
    <button class="btn btn--primary hit-task-btn" (click)="showTask()">📋 Aufgabe anzeigen</button>
  </div>
</div>
