<div class="hit-wrap" [class.hit-wrap--t1]="team === 'team1'" [class.hit-wrap--t2]="team === 'team2'">
  <button class="hit-back-btn" (click)="backToGame()">← Zurück</button>

  <div class="hit-content">
    <div class="hit-icon">🏓</div>
    <h1 class="hit-headline" [class.hit-headline--t1]="team === 'team1'" [class.hit-headline--t2]="team === 'team2'">
      TREFFER!
    </h1>
    <p class="hit-sub">
      Becher von <strong>{{ team === 'team1' ? 'Team 1' : 'Team 2' }}</strong> wurde getroffen
    </p>
    <p class="hit-question">Ist das Team bereit für die Aufgabe?</p>
    <button class="btn btn--primary hit-task-btn" (click)="showTask()">📋 Aufgabe anzeigen</button>
  </div>
</div>
